<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>RMB · Calendario Ferie &amp; Permessi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12151a;
  --surface:#1b1f26;
  --surface2:#20252d;
  --surface3:#262c35;
  --border:#2b323c;
  --text:#e9e7e2;
  --text-dim:#8b93a0;
  --amber:#f2a93b;
  --amber-dim:#8a6626;
  --sun:#2d3b52;
  --sun-text:#8fb4e8;
  --danger:#e0605a;
  --radius:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
}
::-webkit-scrollbar{height:10px;width:10px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:6px;}

/* ---------- HEADER ---------- */
header{
  position:sticky; top:0; z-index:30;
  background:linear-gradient(180deg,#171b21,#12151a);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.brand{display:flex; flex-direction:column; gap:2px; margin-right:auto;}
.brand .kicker{
  font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em;
  color:var(--amber); text-transform:uppercase;
}
.brand h1{
  font-family:'Oswald',sans-serif; font-weight:600; font-size:22px; margin:0;
  letter-spacing:.02em; text-transform:uppercase;
}
.year-nav{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:4px 6px;}
.year-nav button{
  width:30px; height:30px; border-radius:50%; border:none; background:var(--surface3); color:var(--text);
  cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;
}
.year-nav button:hover{background:var(--amber); color:#1a1305;}
.year-nav .yr{font-family:'Oswald',sans-serif; font-size:18px; min-width:64px; text-align:center;}
.btn{
  background:var(--surface3); border:1px solid var(--border); color:var(--text);
  padding:8px 14px; border-radius:999px; cursor:pointer; font-size:13px; font-weight:600;
  font-family:'Inter',sans-serif; display:flex; align-items:center; gap:6px;
}
.btn:hover{border-color:var(--amber); color:var(--amber);}
.btn.primary{background:var(--amber); color:#1a1305; border-color:var(--amber);}
.btn.primary:hover{filter:brightness(1.08); color:#1a1305;}
#drawerToggle{display:none;}

/* ---------- LAYOUT ---------- */
.layout{display:flex; align-items:flex-start;}
main.cal-wrap{flex:1; overflow-x:auto; padding:18px;}
.legend-row{display:flex; gap:18px; align-items:center; margin-bottom:14px; flex-wrap:wrap; font-size:12px; color:var(--text-dim);}
.legend-item{display:flex; align-items:center; gap:6px;}
.swatch{width:16px; height:12px; border-radius:3px; display:inline-block;}
.swatch.ferie{background:#8fbf6b;}
.swatch.permesso{background:repeating-linear-gradient(45deg,#5fa8d3,#5fa8d3 3px,#12151a 3px,#12151a 6px);}
.swatch.malattia{background:#12151a; border:1.5px dotted #d98a5f;}
.swatch.altro{background:transparent; border:1.5px solid #b784cf;}

.year-grid{display:flex; gap:10px; min-width:max-content;}
.month-col{width:172px; flex-shrink:0;}
.month-head{
  font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.06em;
  background:var(--surface3); color:var(--amber); font-size:13px; font-weight:600;
  text-align:center; padding:7px 0; border-radius:6px 6px 0 0; border:1px solid var(--border); border-bottom:none;
}
.day-row{
  display:flex; align-items:flex-start; gap:5px;
  border:1px solid var(--border); border-top:none;
  padding:5px 6px; min-height:33px; background:var(--surface); cursor:pointer;
}
.month-col .day-row:last-child{border-radius:0 0 6px 6px;}
.day-row:hover{background:var(--surface2);}
.day-row.sun{background:var(--sun);}
.day-row.sun:hover{background:#374964;}
.day-num{
  font-family:'JetBrains Mono',monospace; font-size:12px; width:18px; text-align:right; color:var(--text-dim);
  flex-shrink:0; height:18px; display:flex; align-items:center; justify-content:flex-end;
}
.day-row.sun .day-num{color:var(--sun-text); font-weight:700;}
.day-wk{font-size:10px; color:var(--text-dim); width:24px; flex-shrink:0; height:18px; display:flex; align-items:center;}
.day-row.sun .day-wk{color:var(--sun-text);}
.chips{display:flex; flex-wrap:wrap; gap:3px; flex:1;}
.chip{
  height:18px; padding:0 5px; border-radius:5px; flex-shrink:0;
  display:flex; align-items:center; gap:2px; justify-content:center;
  font-size:9.5px; font-weight:700; color:#0c0e11; white-space:nowrap;
  font-family:'Inter',sans-serif; line-height:1;
}
.chip .ic{font-size:9px;}
.chip.type-permesso{background-image:repeating-linear-gradient(45deg, rgba(0,0,0,.18), rgba(0,0,0,.18) 2px, transparent 2px, transparent 4px);}
.chip.type-malattia{border:1.5px dashed rgba(0,0,0,.6);}
.chip.type-altro{border:1.5px solid rgba(0,0,0,.6);}
.chip-more{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-dim); flex-shrink:0;}
.chip.dim, .day-row.dim-mode .chip:not(.hi){opacity:.15;}

/* ---------- SIDEBAR ---------- */
aside.panel{
  width:340px; flex-shrink:0; background:var(--surface); border-left:1px solid var(--border);
  padding:18px; height:calc(100vh - 62px); position:sticky; top:62px; overflow-y:auto;
}
.panel h2{
  font-family:'Oswald',sans-serif; font-size:15px; text-transform:uppercase; letter-spacing:.06em;
  color:var(--text-dim); margin:22px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border);
}
.panel h2:first-child{margin-top:0;}
.worker-list{display:flex; flex-direction:column; gap:4px; margin-bottom:8px;}
.worker-row{
  display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer;
  border:1px solid transparent; font-size:13px;
}
.worker-row:hover{background:var(--surface2);}
.worker-row.active{border-color:var(--amber); background:var(--surface2);}
.worker-dot{width:12px; height:12px; border-radius:50%; flex-shrink:0;}
.worker-row .wname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.worker-row .del{color:var(--text-dim); background:none; border:none; cursor:pointer; font-size:15px; padding:2px 4px; flex-shrink:0;}
.worker-row .del:hover{color:var(--danger);}
.add-row{display:flex; gap:6px; margin-top:6px;}
input,select,textarea{
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  border-radius:6px; padding:8px 10px; font-family:'Inter',sans-serif; font-size:13px; width:100%;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--amber);}
.field{margin-bottom:10px;}
.field label{font-size:11px; color:var(--text-dim); display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em;}
.two-col{display:flex; gap:8px;}
.two-col .field{flex:1;}
.period-list{display:flex; flex-direction:column; gap:6px; max-height:260px; overflow-y:auto; margin-top:10px;}
.period-item{
  display:flex; align-items:center; gap:8px; font-size:12px; padding:6px 8px; border-radius:6px;
  background:var(--surface2); border:1px solid var(--border);
}
.period-item .pdot{width:9px; height:9px; border-radius:3px; flex-shrink:0;}
.period-item .pinfo{flex:1; overflow:hidden;}
.period-item .pinfo b{display:block; font-size:12px;}
.period-item .pinfo span{color:var(--text-dim); font-size:11px;}
.period-item button{background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px;}
.period-item button:hover{color:var(--danger);}
.empty-msg{color:var(--text-dim); font-size:12.5px; line-height:1.5; padding:10px 0;}

/* ---------- MODAL ---------- */
.modal-bg{
  position:fixed; inset:0; background:rgba(10,12,15,.7); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal-bg.show{display:flex;}
.modal{
  background:var(--surface); border:1px solid var(--border); border-radius:10px; width:100%; max-width:380px;
  padding:20px; max-height:80vh; overflow-y:auto;
}
.modal h3{font-family:'Oswald',sans-serif; margin:0 0 12px; text-transform:uppercase; letter-spacing:.04em; font-size:16px; color:var(--amber);}
.modal .close{float:right; background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer;}
.modal-entry{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px;}
.modal-entry:last-child{border-bottom:none;}
.modal-entry .mdot{width:12px; height:12px; border-radius:4px; flex-shrink:0;}
.modal-entry .mtxt b{display:block;}
.modal-entry .mtxt span{color:var(--text-dim); font-size:11.5px;}

.cal-title{
  font-family:'Oswald',sans-serif; font-weight:600; font-size:19px; text-transform:uppercase;
  letter-spacing:.03em; margin:0 0 14px; color:var(--text);
}
.cal-title span{color:var(--amber);}
#pdfBtn.loading{opacity:.6; pointer-events:none;}

/* ---------- RESPONSIVE ---------- */

#panelBack{display:none;}
@media (max-width:900px){
  #panelBack{
    display:flex; align-items:center; gap:6px; margin-bottom:14px; width:100%; justify-content:center;
  }
  aside.panel{
    position:fixed; right:0; top:0; bottom:0; z-index:60; transform:translateX(100%);
    transition:transform .25s ease; height:100vh; box-shadow:-10px 0 30px rgba(0,0,0,.4);
  }
  aside.panel.open{transform:translateX(0);}
  #drawerToggle{display:flex;}
  header{padding:10px 12px;}
  .brand h1{font-size:17px;}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="kicker">RMB · Impianto</span>
    <h1>Ferie &amp; Permessi</h1>
  </div>
  <div class="year-nav">
    <button id="prevYear">‹</button>
    <span class="yr" id="yearLabel">2026</span>
    <button id="nextYear">›</button>
  </div>
  <button class="btn" id="clearIsolate" style="display:none;">✕ Mostra tutti</button>
  <button class="btn primary" id="pdfBtn">📄 Invia PDF</button>
  <button class="btn primary" id="drawerToggle">👤 Operai</button>
</header>

<div class="layout">
  <main class="cal-wrap" id="calWrap">
    <h2 class="cal-title">Calendario Ferie e Permessi — <span id="calTitleYear">2026</span></h2>
    <div class="legend-row">
      <div class="legend-item"><span class="swatch ferie"></span> 🌴 Ferie</div>
      <div class="legend-item"><span class="swatch permesso"></span> ✋ Permesso</div>
      <div class="legend-item"><span class="swatch malattia"></span> 🤒 Malattia</div>
      <div class="legend-item"><span class="swatch altro"></span> 📌 Altro</div>
      <div class="legend-item">Ogni pallino mostra già nome e tipo · tocca un giorno per i dettagli completi</div>
    </div>
    <div class="year-grid" id="yearGrid"></div>
  </main>

  <aside class="panel" id="panel">
    <button class="btn" id="panelBack">‹ Indietro</button>
    <h2>Operai</h2>
    <div class="worker-list" id="workerList"></div>
    <div class="add-row">
      <input type="text" id="newWorkerName" placeholder="Nome operaio...">
      <button class="btn primary" id="addWorkerBtn">+</button>
    </div>

    <h2>Nuovo periodo</h2>
    <div class="field">
      <label>Operaio</label>
      <select id="pWorker"></select>
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="pType">
        <option value="ferie">Ferie</option>
        <option value="permesso">Permesso</option>
        <option value="malattia">Malattia</option>
        <option value="altro">Altro</option>
      </select>
    </div>
    <div class="two-col">
      <div class="field"><label>Dal</label><input type="date" id="pStart"></div>
      <div class="field"><label>Al</label><input type="date" id="pEnd"></div>
    </div>
    <div class="field">
      <label>Nota (facoltativa)</label>
      <input type="text" id="pNote" placeholder="es. rientro ore 10:00">
    </div>
    <button class="btn primary" style="width:100%; justify-content:center;" id="savePeriodBtn">Aggiungi periodo</button>

    <h2>Periodi inseriti</h2>
    <div class="period-list" id="periodList"></div>
  </aside>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="close" id="modalClose">✕</button>
    <h3 id="modalTitle">Giorno</h3>
    <div id="modalBody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const STORAGE_KEY = 'rmb_calendario_ferie_permessi';
const MESI = ['GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO','LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'];
const GIORNI_SETT = ['DOM','LUN','MAR','MER','GIO','VEN','SAB'];
const TIPI_LABEL = {ferie:'Ferie', permesso:'Permesso', malattia:'Malattia', altro:'Altro'};

let state = loadState();
let currentYear = new Date().getFullYear();
let editingId = null;
let isolatedWorker = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {workers:[], periods:[]};
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function colorForIndex(i){
  const hue = (i * 137.508) % 360;
  return `hsl(${hue.toFixed(0)}, 68%, 58%)`;
}

function pad(n){return String(n).padStart(2,'0');}
function iso(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
function daysInMonth(y,m){return new Date(y, m+1, 0).getDate();}

/* ---------- WORKERS ---------- */
function addWorker(name){
  if(!name.trim()) return;
  const id = 'w' + Date.now() + Math.floor(Math.random()*1000);
  state.workers.push({id, name:name.trim(), color: colorForIndex(state.workers.length)});
  saveState();
  renderAll();
}
function deleteWorker(id){
  if(!confirm('Eliminare questo operaio e tutti i suoi periodi?')) return;
  state.workers = state.workers.filter(w=>w.id!==id);
  state.periods = state.periods.filter(p=>p.workerId!==id);
  if(isolatedWorker===id) isolatedWorker=null;
  saveState();
  renderAll();
}

/* ---------- PERIODS ---------- */
function savePeriod(){
  const workerId = document.getElementById('pWorker').value;
  const type = document.getElementById('pType').value;
  const start = document.getElementById('pStart').value;
  const end = document.getElementById('pEnd').value;
  const note = document.getElementById('pNote').value.trim();
  if(!workerId || !start || !end){alert('Seleziona operaio e date valide.'); return;}
  if(end < start){alert('La data "Al" deve essere successiva o uguale a "Dal".'); return;}
  if(editingId){
    const p = state.periods.find(p=>p.id===editingId);
    Object.assign(p, {workerId, type, start, end, note});
    editingId = null;
    document.getElementById('savePeriodBtn').textContent = 'Aggiungi periodo';
  } else {
    state.periods.push({id:'p'+Date.now()+Math.floor(Math.random()*1000), workerId, type, start, end, note});
  }
  saveState();
  document.getElementById('pNote').value='';
  renderAll();
}
function deletePeriod(id){
  state.periods = state.periods.filter(p=>p.id!==id);
  saveState();
  renderAll();
}
function editPeriod(id){
  const p = state.periods.find(p=>p.id===id);
  if(!p) return;
  document.getElementById('pWorker').value = p.workerId;
  document.getElementById('pType').value = p.type;
  document.getElementById('pStart').value = p.start;
  document.getElementById('pEnd').value = p.end;
  document.getElementById('pNote').value = p.note||'';
  editingId = id;
  document.getElementById('savePeriodBtn').textContent = 'Salva modifiche';
  document.getElementById('panel').classList.add('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

function periodsOnDate(dateStr){
  return state.periods.filter(p => dateStr >= p.start && dateStr <= p.end);
}

/* ---------- RENDER ---------- */
function renderWorkerList(){
  const list = document.getElementById('workerList');
  const select = document.getElementById('pWorker');
  list.innerHTML = '';
  select.innerHTML = '';
  if(state.workers.length===0){
    list.innerHTML = '<div class="empty-msg">Nessun operaio ancora. Aggiungine uno qui sotto per iniziare.</div>';
  }
  state.workers.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(w=>{
    const row = document.createElement('div');
    row.className = 'worker-row' + (isolatedWorker===w.id ? ' active' : '');
    row.innerHTML = `<span class="worker-dot" style="background:${w.color}"></span><span class="wname">${escapeHtml(w.name)}</span><button class="del" title="Elimina">🗑</button>`;
    row.querySelector('.wname').onclick = row.querySelector('.worker-dot').onclick = ()=>{
      isolatedWorker = (isolatedWorker===w.id) ? null : w.id;
      renderAll();
    };
    row.querySelector('.del').onclick = (e)=>{e.stopPropagation(); deleteWorker(w.id);};
    list.appendChild(row);

    const opt = document.createElement('option');
    opt.value = w.id; opt.textContent = w.name;
    select.appendChild(opt);
  });
  document.getElementById('clearIsolate').style.display = isolatedWorker ? 'flex' : 'none';
}

function renderPeriodList(){
  const list = document.getElementById('periodList');
  list.innerHTML = '';
  const sorted = state.periods.slice().sort((a,b)=> b.start.localeCompare(a.start));
  if(sorted.length===0){
    list.innerHTML = '<div class="empty-msg">Nessun periodo registrato.</div>';
    return;
  }
  sorted.forEach(p=>{
    const w = state.workers.find(w=>w.id===p.workerId);
    if(!w) return;
    const item = document.createElement('div');
    item.className = 'period-item';
    item.innerHTML = `<span class="pdot" style="background:${w.color}"></span>
      <div class="pinfo"><b>${escapeHtml(w.name)} · ${TIPI_LABEL[p.type]}</b><span>${fmtDate(p.start)} → ${fmtDate(p.end)}${p.note? ' · '+escapeHtml(p.note):''}</span></div>
      <button class="editBtn" title="Modifica">✎</button>
      <button class="delBtn" title="Elimina">🗑</button>`;
    item.querySelector('.editBtn').onclick = ()=>editPeriod(p.id);
    item.querySelector('.delBtn').onclick = ()=>deletePeriod(p.id);
    list.appendChild(item);
  });
}

function fmtDate(d){
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderCalendar(){
  document.getElementById('yearLabel').textContent = currentYear;
  document.getElementById('calTitleYear').textContent = currentYear;
  const grid = document.getElementById('yearGrid');
  grid.innerHTML = '';
  for(let m=0; m<12; m++){
    const col = document.createElement('div');
    col.className = 'month-col';
    const head = document.createElement('div');
    head.className = 'month-head';
    head.textContent = MESI[m];
    col.appendChild(head);
    const nDays = daysInMonth(currentYear, m);
    for(let d=1; d<=nDays; d++){
      const dateStr = iso(currentYear, m, d);
      const wk = new Date(currentYear, m, d).getDay();
      const row = document.createElement('div');
      row.className = 'day-row' + (wk===0 ? ' sun' : '');
      const entries = periodsOnDate(dateStr);
      let chipsHtml = '';
      const TYPE_ICON = {ferie:'🌴', permesso:'✋', malattia:'🤒', altro:'📌'};
      entries.forEach(p=>{
        const w = state.workers.find(w=>w.id===p.workerId);
        if(!w) return;
        const dimClass = (isolatedWorker && isolatedWorker!==p.workerId) ? ' dim' : '';
        const hiClass = (isolatedWorker && isolatedWorker===p.workerId) ? ' hi' : '';
        const shortName = w.name.trim().split(/\s+/)[0].slice(0,4);
        chipsHtml += `<span class="chip type-${p.type}${dimClass}${hiClass}" style="background:${w.color}" title="${escapeHtml(w.name)} · ${TIPI_LABEL[p.type]}"><span class="ic">${TYPE_ICON[p.type]}</span>${escapeHtml(shortName)}</span>`;
      });
      row.innerHTML = `<span class="day-num">${d}</span><span class="day-wk">${GIORNI_SETT[wk]}</span><span class="chips">${chipsHtml}</span>`;
      row.onclick = ()=>openDayModal(dateStr, entries);
      col.appendChild(row);
    }
    grid.appendChild(col);
  }
}

function openDayModal(dateStr, entries){
  const bg = document.getElementById('modalBg');
  document.getElementById('modalTitle').textContent = fmtDate(dateStr);
  const body = document.getElementById('modalBody');
  if(entries.length===0){
    body.innerHTML = '<div class="empty-msg">Nessuno assente questo giorno.</div>';
  } else {
    body.innerHTML = entries.map(p=>{
      const w = state.workers.find(w=>w.id===p.workerId);
      if(!w) return '';
      return `<div class="modal-entry"><span class="mdot" style="background:${w.color}"></span>
        <div class="mtxt"><b>${escapeHtml(w.name)}</b><span>${TIPI_LABEL[p.type]} · ${fmtDate(p.start)} → ${fmtDate(p.end)}${p.note?' · '+escapeHtml(p.note):''}</span></div></div>`;
    }).join('');
  }
  bg.classList.add('show');
}

function renderAll(){
  renderWorkerList();
  renderPeriodList();
  renderCalendar();
}

/* ---------- EVENTS ---------- */
document.getElementById('prevYear').onclick = ()=>{currentYear--; renderCalendar();};

document.getElementById('panelBack').onclick = ()=> document.getElementById('panel').classList.remove('open');

/* ---------- EXPORT / INVIO PDF OPTIMIZED ---------- */
async function exportAndSharePDF(){
  const btn = document.getElementById('pdfBtn');
  const originalLabel = btn.textContent;

  if(typeof html2canvas === 'undefined' || !window.jspdf){
    alert('Per generare il PDF serve una connessione internet (la prima volta scarica gli strumenti necessari). Controlla la connessione e riprova.');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '⏳ Genero il PDF...';

  const wrap = document.getElementById('calWrap');
  const prevOverflow = wrap.style.overflow;
  const prevWidth = wrap.style.width;

  try{
    wrap.style.overflow = 'visible';
    wrap.style.width = 'max-content';

    // OTTIMIZZAZIONE 1: Scala ridotta a 1 per ridurre le dimensioni totali del canvas di 4 volte[span_2](start_span)[span_2](end_span)
    const canvas = await html2canvas(wrap, {
      backgroundColor: '#12151a',
      scale: 1,
      useCORS: true
    });

    wrap.style.overflow = prevOverflow;
    wrap.style.width = prevWidth;

    // OTTIMIZZAZIONE 2: Qualità dell'immagine abbassata a 0.6 per renderla super leggera[span_3](start_span)[span_3](end_span)
    const imgData = canvas.toDataURL('image/jpeg', 0.6);
    const { jsPDF } = window.jspdf;
    
    const ptW = canvas.width * 0.75;   // px -> pt
    const ptH = canvas.height * 0.75;
    
    // OTTIMIZZAZIONE 3: Inserito parametro "compress: true" per forzare l'algoritmo Flate/Deflate nel motore PDF[span_4](start_span)[span_4](end_span)
    const pdf = new jsPDF({
      orientation: ptW > ptH ? 'landscape' : 'portrait',
      unit: 'pt',
      format: [ptW, ptH],
      compress: true
    });
    
    pdf.addImage(imgData, 'JPEG', 0, 0, ptW, ptH);
    const fileName = `Calendario_Ferie_Permessi_${currentYear}.pdf`;
    const pdfBlob = pdf.output('blob');
    const file = new File([pdfBlob], fileName, {type:'application/pdf'});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title: fileName,
        text: `Calendario ferie e permessi ${currentYear}`
      });
    } else {
      pdf.save(fileName);
      alert('PDF scaricato. Aprilo dai File del telefono per allegarlo a email o WhatsApp.');
    }
  }catch(err){
    wrap.style.overflow = prevOverflow;
    wrap.style.width = prevWidth;
    console.error(err);
    if(err && err.name === 'AbortError'){
      // utente ha annullato la condivisione
    } else {
      alert('Non sono riuscito a generare il PDF. Riprova (serve connessione internet).');
    }
  }finally{
    btn.classList.remove('loading');
    btn.textContent = originalLabel;
  }
}
document.getElementById('pdfBtn').onclick = exportAndSharePDF;

renderAll();
</script>
